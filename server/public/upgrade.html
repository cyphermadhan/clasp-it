<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/icon.png" />
  <title>Upgrade to Pro — Clasp-it</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @font-face {
      font-family: "AnthropicSans";
      src: url("/fonts/AnthropicSans-Roman-Web.woff2") format("woff2");
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: "AnthropicSerif";
      src: url("/fonts/AnthropicSerif-Roman-Web.woff2") format("woff2");
      font-weight: 400; font-style: normal; font-display: swap;
    }

    :root {
      --accent: #c6613f;
      --accent-dark: #a84e30;
      --text: #141413;
      --text-secondary: #73726c;
      --bg: #faf9f7;
      --bg-card: #ffffff;
      --border: rgba(31, 30, 29, 0.12);
    }

    body {
      font-family: "AnthropicSans", -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      padding: 40px 24px;
    }

    a { color: inherit; text-decoration: none; }

    .nav-logo {
      position: fixed;
      top: 24px;
      left: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .nav-logo img { width: 24px; height: 24px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-family: "AnthropicSerif", serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .price {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -2px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .price-note {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .features {
      list-style: none;
      text-align: left;
      margin-bottom: 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .features li {
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .features li::before {
      content: '';
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(198, 97, 63, 0.12);
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='8' viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4L3.5 6.5L9 1' stroke='%23c6613f' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: center;
      flex-shrink: 0;
    }

    .email-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .email-input:focus { border-color: var(--accent); }

    .btn-upgrade {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-upgrade:hover:not(:disabled) { background: var(--accent-dark); }
    .btn-upgrade:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      font-size: 13px;
      color: #c0392b;
      margin-top: 10px;
      display: none;
    }

    .back {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .back a { color: var(--accent); }
  </style>
</head>
<body>

  <a href="/" class="nav-logo">
    <img src="/icon.png" alt="Clasp-it" />
    Clasp-it
  </a>

  <div class="card">
    <h1>Upgrade to Pro</h1>
    <p class="subtitle">One payment. Unlimited picks, forever.</p>

    <div class="price">$19</div>
    <p class="price-note">one-time · no subscription</p>

    <ul class="features">
      <li>Unlimited picks per day</li>
      <li>Screenshot capture</li>
      <li>Console logs</li>
      <li>Network requests</li>
      <li>React props</li>
    </ul>

    <input id="email-input" class="email-input" type="email" placeholder="your@email.com" />
    <button id="upgrade-btn" class="btn-upgrade">Get Pro — $19</button>
    <div id="error-msg" class="error"></div>

    <p class="back">← <a href="/">Back to home</a></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const emailInput = document.getElementById("email-input");
    const upgradeBtn = document.getElementById("upgrade-btn");
    const errorMsg = document.getElementById("error-msg");

    // Pre-fill email if passed (only from internal redirects, not from extension)
    const preEmail = params.get("e");
    if (preEmail) emailInput.value = preEmail;

    upgradeBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();
      if (!email || !email.includes("@")) {
        errorMsg.textContent = "Please enter a valid email address.";
        errorMsg.style.display = "";
        return;
      }

      upgradeBtn.disabled = true;
      upgradeBtn.textContent = "Redirecting to checkout…";
      errorMsg.style.display = "none";

      try {
        const res = await fetch("/billing/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, plan: "pro" }),
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          errorMsg.textContent = data.error || "Something went wrong. Please try again.";
          errorMsg.style.display = "";
          upgradeBtn.disabled = false;
          upgradeBtn.textContent = "Get Pro — $19";
        }
      } catch {
        errorMsg.textContent = "Network error. Please try again.";
        errorMsg.style.display = "";
        upgradeBtn.disabled = false;
        upgradeBtn.textContent = "Get Pro — $19";
      }
    });
  </script>
  <script type="module">
    import { observe } from "https://cdn.jsdelivr.net/npm/@vibesignals/observe@latest/dist/index.mjs";
    const vs = observe({ apiKey: "acgfpGDz5qvPlYyMKhZvxZVYVQZ4KQtupgPMD1ljeY0" });
    vs.track("page_view", { page: "upgrade" });
    document.getElementById("upgrade-btn")?.addEventListener("click", () => {
      vs.track("upgrade_checkout_started");
    });
  </script>

</body>
</html>
